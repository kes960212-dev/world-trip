<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 세계 나라 대탐험</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson-client/3.1.0/topojson-client.min.js"></script>
<style>
:root{
  --bg1:#1a2a6c; --bg2:#2a4d8f; --card:#ffffff; --ink:#2d3142;
  --accent:#ff9f1c; --accent2:#2ec4b6; --wrong:#e63946; --right:#43aa8b;
  --gold:#ffd166;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Gowun Dodum',sans-serif;background:linear-gradient(160deg,var(--bg1),var(--bg2) 60%,#3a6ea5);min-height:100vh;color:var(--ink)}
h1,h2,h3,.jua{font-family:'Jua',sans-serif}
.screen{display:none;max-width:1100px;margin:0 auto;padding:16px}
.screen.active{display:block;animation:fadein .4s}
@keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
button{font-family:'Jua',sans-serif;border:none;cursor:pointer;border-radius:14px;transition:transform .12s, box-shadow .12s}
button:active{transform:scale(.96)}
.btn{background:var(--accent);color:#fff;font-size:1.1rem;padding:12px 28px;box-shadow:0 4px 0 #d67f00}
.btn:hover{transform:translateY(-2px)}
.btn.teal{background:var(--accent2);box-shadow:0 4px 0 #1d9c8f}
.btn.ghost{background:rgba(255,255,255,.15);color:#fff;box-shadow:none;border:2px solid rgba(255,255,255,.4)}
.btn.small{font-size:.95rem;padding:8px 16px}
/* ---------- HUD ---------- */
#hud{display:none;max-width:1100px;margin:0 auto;padding:12px 16px 0;align-items:center;gap:12px;flex-wrap:wrap}
#hud.show{display:flex}
.hud-card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:16px;padding:8px 14px;color:#fff;display:flex;align-items:center;gap:8px;backdrop-filter:blur(4px)}
#hud-avatar{font-size:1.6rem}
#hud-name{font-family:'Jua';font-size:1.05rem}
#hud-title{font-size:.8rem;color:var(--gold)}
.xpbar{width:150px;height:12px;background:rgba(0,0,0,.35);border-radius:8px;overflow:hidden}
.xpbar>div{height:100%;background:linear-gradient(90deg,var(--gold),var(--accent));width:0%;transition:width .6s}
#hud-right{margin-left:auto;display:flex;gap:8px}
/* ---------- LOGIN ---------- */
#screen-login{max-width:520px;text-align:center;padding-top:6vh;color:#fff}
#screen-login h1{font-size:2.4rem;text-shadow:0 3px 8px rgba(0,0,0,.35);margin-bottom:6px}
#screen-login .sub{opacity:.9;margin-bottom:26px}
.login-card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:24px;padding:28px;backdrop-filter:blur(6px)}
#nickname{width:100%;font-size:1.2rem;padding:12px 16px;border-radius:14px;border:none;text-align:center;font-family:'Jua';margin-bottom:16px}
.avatars{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.avatar-pick{font-size:1.9rem;background:rgba(255,255,255,.15);border-radius:50%;width:56px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:3px solid transparent;transition:all .15s}
.avatar-pick:hover{transform:scale(1.12)}
.avatar-pick.sel{border-color:var(--gold);background:rgba(255,209,102,.3);transform:scale(1.12)}
#login-status{margin-top:14px;font-size:.85rem;opacity:.85;min-height:1.2em}
/* ---------- HOME ---------- */
#screen-home h2{color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.3);margin:10px 0 16px;font-size:1.7rem}
.continent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.cont-card{background:var(--card);border-radius:20px;padding:18px;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.25);transition:transform .15s;position:relative;overflow:hidden}
.cont-card:hover{transform:translateY(-4px)}
.cont-card .emoji{font-size:2.2rem}
.cont-card h3{font-size:1.3rem;margin:6px 0 2px}
.cont-card .cnt{font-size:.85rem;color:#666}
.cont-progress{height:10px;background:#eee;border-radius:6px;margin-top:10px;overflow:hidden}
.cont-progress>div{height:100%;background:linear-gradient(90deg,var(--accent2),#5fd6c9);transition:width .5s}
.cont-badge{position:absolute;top:14px;right:14px;font-size:1.6rem;filter:grayscale(1);opacity:.35}
.cont-badge.earned{filter:none;opacity:1;animation:pop .4s}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
.home-actions{display:flex;gap:10px;margin:18px 0;flex-wrap:wrap}
/* ---------- STAGE (tier select) ---------- */
.tier-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:14px}
.tier-card{background:var(--card);border-radius:18px;padding:18px;box-shadow:0 5px 14px rgba(0,0,0,.22)}
.tier-card.locked{opacity:.55;filter:grayscale(.6)}
.tier-card h3{font-size:1.15rem}
.tier-card .desc{font-size:.85rem;color:#666;margin:4px 0 10px}
.chip{display:inline-block;background:#f0f4ff;color:#4a5aa8;font-size:.75rem;border-radius:8px;padding:3px 8px;margin:2px}
.chip.done{background:#e3f7f1;color:#2a8d75;text-decoration:line-through}
/* ---------- QUIZ ---------- */
#quiz-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;color:#fff;margin-bottom:10px}
#quiz-question{background:var(--card);color:var(--ink);border-radius:16px;padding:12px 20px;font-family:'Jua';font-size:1.25rem;box-shadow:0 4px 12px rgba(0,0,0,.25);flex:1;min-width:260px}
#quiz-question b{color:var(--accent);font-size:1.4rem}
#hearts{font-size:1.4rem;letter-spacing:2px}
#map-wrap{background:#bfe3f2;border-radius:20px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.3);position:relative}
#map-wrap svg{display:block;width:100%;height:auto}
.country{fill:#e8e2d0;stroke:#9db4c0;stroke-width:.5;cursor:pointer;transition:fill .15s}
.country.in-cont{fill:#f7edd3}
.country.in-cont:hover{fill:var(--gold)}
.country.dim{cursor:default;fill:#d5d9dd}
.country.correct{fill:var(--right);animation:blink .5s 3}
.country.wrongpick{fill:var(--wrong)}
.country.explored-mark{fill:#bfe0b8}
@keyframes blink{50%{fill:#7fe0c3}}
.tiny-target{fill:rgba(255,159,28,.001);stroke:rgba(255,159,28,.65);stroke-width:1.2;stroke-dasharray:3 3;cursor:pointer}
#quiz-feedback{min-height:2em;color:#fff;font-family:'Jua';font-size:1.05rem;margin-top:10px;text-align:center;text-shadow:0 2px 4px rgba(0,0,0,.4)}
#quiz-hint{color:var(--gold);font-size:.95rem;text-align:center;margin-top:4px;min-height:1.4em}
/* ---------- INFO MODAL ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(10,15,40,.7);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.modal-bg.show{display:flex;animation:fadein .3s}
.modal{background:var(--card);border-radius:24px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;padding:24px}
.modal .flagline{font-size:2rem}
.modal h2{font-size:1.6rem;margin:4px 0 2px}
.modal .en{color:#888;font-size:.9rem;margin-bottom:10px}
.xp-gain{display:inline-block;background:var(--gold);color:#7a5200;font-family:'Jua';border-radius:10px;padding:4px 12px;margin:6px 0;animation:pop .5s}
.tabs{display:flex;gap:6px;margin:12px 0}
.tab{flex:1;background:#f0f0f5;border-radius:10px;padding:8px;font-size:.95rem;color:#555}
.tab.on{background:var(--accent2);color:#fff}
.tabpanel{background:#f8f9fc;border-radius:14px;padding:14px;font-size:.95rem;line-height:1.7;min-height:120px}
.tabpanel dt{font-family:'Jua';color:#4a5aa8;margin-top:8px}
.tabpanel dt:first-child{margin-top:0}
.note-area{margin-top:14px}
.note-area textarea{width:100%;border:2px solid #dfe3f0;border-radius:12px;padding:10px;font-family:'Gowun Dodum';font-size:.95rem;resize:vertical;min-height:64px}
.modal-actions{display:flex;gap:10px;margin-top:14px;justify-content:flex-end}
/* ---------- PASSPORT / RANK ---------- */
.panel{background:var(--card);border-radius:20px;padding:20px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.pass-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-top:12px}
.pass-item{background:#f8f9fc;border-radius:14px;padding:12px;cursor:pointer;border:2px solid transparent}
.pass-item:hover{border-color:var(--accent2)}
.pass-item .nm{font-family:'Jua';font-size:1.05rem}
.pass-item .nt{font-size:.8rem;color:#777;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge-shelf{display:flex;gap:14px;flex-wrap:wrap;margin:12px 0}
.badge-item{text-align:center;width:86px}
.badge-item .ic{font-size:2.4rem;filter:grayscale(1);opacity:.3}
.badge-item.earned .ic{filter:none;opacity:1}
.badge-item .lb{font-size:.72rem;color:#666;margin-top:2px}
table.rank{width:100%;border-collapse:collapse;margin-top:10px}
table.rank td,table.rank th{padding:8px 10px;text-align:left;border-bottom:1px solid #eee;font-size:.95rem}
table.rank tr.me{background:#fff8e6}
.back-row{margin:12px 0}
/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(20,25,50,.92);color:#fff;padding:12px 22px;border-radius:14px;font-family:'Jua';display:none;z-index:99;text-align:center}
#toast.show{display:block;animation:fadein .3s}
/* level-up overlay */
#levelup{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:80;background:rgba(10,15,40,.6);pointer-events:none}
#levelup.show{display:flex}
#levelup .box{background:var(--gold);color:#5a3d00;font-family:'Jua';font-size:1.6rem;padding:26px 44px;border-radius:24px;box-shadow:0 0 60px rgba(255,209,102,.9);animation:pop .5s;text-align:center}
@media(max-width:640px){ .xpbar{width:90px} #screen-login h1{font-size:1.8rem} }
</style>
</head>
<body>

<div id="hud">
  <div class="hud-card"><span id="hud-avatar">🧭</span>
    <div><div id="hud-name">-</div><div id="hud-title">새싹 탐험가</div></div>
  </div>
  <div class="hud-card"><span class="jua" id="hud-level">Lv.1</span>
    <div class="xpbar"><div id="hud-xpfill"></div></div><span id="hud-xp" style="font-size:.8rem">0 XP</span>
  </div>
  <div class="hud-card">🗺️ <span id="hud-explored" class="jua">0</span>개국 탐험</div>
  <div id="hud-right">
    <button class="btn ghost small" onclick="showScreen('home')">🏠 홈</button>
    <button class="btn ghost small" onclick="openPassport()">📔 탐험 여권</button>
    <button class="btn ghost small" onclick="openRank()">🏆 랭킹</button>
  </div>
</div>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <h1>🌍 세계 나라 대탐험</h1>
  <div class="sub">지도 위를 모험하며 세계 여러 나라를 알아가는 탐험 게임!</div>
  <div class="login-card">
    <div class="jua" style="color:#fff;font-size:1.1rem;margin-bottom:10px">탐험가 이름(닉네임)을 정해 주세요</div>
    <input id="nickname" maxlength="10" placeholder="예) 번개탐험가">
    <div class="jua" style="color:#fff;font-size:1rem;margin-bottom:8px">캐릭터 고르기</div>
    <div class="avatars" id="avatar-row"></div>
    <button class="btn" onclick="startAdventure()">모험 시작! 🚀</button>
    <div id="login-status"></div>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="screen-home">
  <h2>🗺️ 어느 대륙으로 떠나 볼까요?</h2>
  <div class="continent-grid" id="continent-grid"></div>
</div>

<!-- TIER SELECT -->
<div class="screen" id="screen-stage">
  <div class="back-row"><button class="btn ghost small" onclick="showScreen('home')">← 대륙 선택으로</button></div>
  <h2 id="stage-title" style="color:#fff;font-size:1.6rem;margin-bottom:4px"></h2>
  <div class="tier-row" id="tier-row"></div>
</div>

<!-- QUIZ -->
<div class="screen" id="screen-quiz">
  <div id="quiz-top">
    <button class="btn ghost small" onclick="exitQuiz()">← 그만하기</button>
    <div id="quiz-question">문제</div>
    <div class="hud-card">❤️ <span id="hearts">❤️❤️❤️</span></div>
    <div class="hud-card">📍 <span id="quiz-progress" class="jua">1/8</span></div>
  </div>
  <div id="map-wrap"></div>
  <div id="quiz-feedback"></div>
  <div id="quiz-hint"></div>
</div>

<!-- PASSPORT -->
<div class="screen" id="screen-passport">
  <div class="back-row"><button class="btn ghost small" onclick="showScreen('home')">← 홈으로</button></div>
  <div class="panel">
    <h2>📔 나의 탐험 여권</h2>
    <div style="font-size:.9rem;color:#666" id="pass-summary"></div>
    <h3 style="margin-top:14px">🎖️ 탐험 배지</h3>
    <div class="badge-shelf" id="badge-shelf"></div>
    <h3>🌏 탐험한 나라 (클릭하면 다시 볼 수 있어요)</h3>
    <div class="pass-list" id="pass-list"></div>
  </div>
</div>

<!-- RANK -->
<div class="screen" id="screen-rank">
  <div class="back-row"><button class="btn ghost small" onclick="showScreen('home')">← 홈으로</button></div>
  <div class="panel">
    <h2>🏆 우리 반 탐험가 랭킹 TOP 10</h2>
    <table class="rank"><thead><tr><th>순위</th><th>탐험가</th><th>레벨</th><th>XP</th><th>탐험 국가</th></tr></thead>
    <tbody id="rank-body"><tr><td colspan="5">불러오는 중...</td></tr></tbody></table>
  </div>
</div>

<!-- INFO MODAL -->
<div class="modal-bg" id="modal-info">
  <div class="modal">
    <div class="flagline" id="mi-flag">🏳️</div>
    <h2 id="mi-name">나라</h2>
    <div class="en" id="mi-en"></div>
    <div id="mi-xp"></div>
    <div class="tabs">
      <button class="tab on" data-tab="basic" onclick="switchTab('basic')">📌 기본 정보</button>
      <button class="tab" data-tab="life" onclick="switchTab('life')">🍚 의식주</button>
      <button class="tab" data-tab="culture" onclick="switchTab('culture')">🎭 문화·재미</button>
    </div>
    <div class="tabpanel" id="mi-panel"></div>
    <div class="note-area">
      <div class="jua" style="margin-bottom:6px">✏️ 나의 탐험 일지 <span style="font-size:.8rem;color:#888;font-family:'Gowun Dodum'">— 새로 알게 된 점을 한 줄로!</span></div>
      <textarea id="mi-note" placeholder="예) 이 나라 사람들은 쌀국수를 즐겨 먹는다!"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn teal" onclick="saveNoteAndClose()">일지 저장하고 계속 ▶</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="levelup"><div class="box" id="levelup-box"></div></div>
<script>
/* ================= 데이터 ================= */
const CONTINENTS = [
  {key:'asia', name:'아시아', emoji:'🐼', badge:'🐉', desc:'세계에서 가장 크고 인구가 많은 대륙'},
  {key:'europe', name:'유럽', emoji:'🏰', badge:'🗼', desc:'다양한 역사와 문화가 살아있는 대륙'},
  {key:'africa', name:'아프리카', emoji:'🦁', badge:'🌍', desc:'사막·초원·정글이 펼쳐진 생명의 대륙'},
  {key:'namerica', name:'북아메리카', emoji:'🗽', badge:'🦅', desc:'북극에서 열대까지 이어진 대륙'},
  {key:'samerica', name:'남아메리카', emoji:'🦜', badge:'⚽', desc:'아마존과 안데스산맥의 대륙'},
  {key:'oceania', name:'오세아니아', emoji:'🦘', badge:'🏝️', desc:'푸른 바다 위 섬나라들의 대륙'},
];
const TIERS = [
  {tier:1, name:'초급 탐험', emoji:'🥉', desc:'유명한 큰 나라부터 찾아보아요', xp:10},
  {tier:2, name:'중급 탐험', emoji:'🥈', desc:'조금 더 어려운 나라에 도전!', xp:20},
  {tier:3, name:'고급 탐험', emoji:'🥇', desc:'진짜 탐험가만 아는 나라들!', xp:30},
];
/* id = ISO 3166-1 숫자코드(세계지도 데이터와 연결) */
const COUNTRIES = [
/* ---------- 아시아 ---------- */
{id:'410',cont:'asia',tier:1,flag:'🇰🇷',n:'대한민국',en:'South Korea',cap:'서울',pop:'약 5,100만 명',loc:'아시아 동쪽 끝, 삼면이 바다로 둘러싸인 반도 국가',food:'밥과 김치, 된장찌개 등 발효 음식이 발달',cloth:'전통 옷은 한복, 명절에 입어요',house:'전통 가옥은 온돌이 있는 한옥',cul:'K-팝과 드라마 등 한류 문화가 세계로 퍼지고 있어요',fact:'세계에서 인터넷 속도가 가장 빠른 나라 중 하나예요!'},
{id:'156',cont:'asia',tier:1,flag:'🇨🇳',n:'중국',en:'China',cap:'베이징',pop:'약 14억 명',loc:'아시아 동부, 세계에서 4번째로 넓은 나라',food:'지역마다 다른 요리 문화, 만두·볶음밥·훠궈',cloth:'전통 옷은 치파오와 한푸',house:'전통 가옥으로 사합원(마당을 둘러싼 집)이 유명',cul:'한자, 경극, 서예 등 오랜 역사의 문화',fact:'만리장성의 길이는 무려 2만 km가 넘어요!'},

let USE_FIREBASE = !/여기에/.test(firebaseConfig.apiKey);
let db=null, auth=null, uid=null;

/* ---------------- 플레이어 상태 ---------------- */
let P = { nickname:'', avatar:'🧭', xp:0, explored:{}, badges:[] };
const AVATARS = ['🧭','🦊','🐯','🐰','🦖','🐧','🦄','👩‍🚀','🕵️','🐢'];
const TITLES = [[0,'새싹 탐험가'],[3,'견습 탐험가'],[5,'용감한 탐험가'],[7,'세계 여행가'],[10,'대륙 정복자'],[13,'지리 박사'],[16,'전설의 탐험가']];
function levelOf(xp){ return Math.min(20, Math.floor(Math.sqrt(xp/40))+1); }
function xpForLevel(l){ return 40*(l-1)*(l-1); }
function titleOf(lv){ let t=TITLES[0][1]; for(const [minL,name] of TITLES){ if(lv>=minL) t=name; } return t; }
const SPECIAL_BADGES = [
  {id:'first', ic:'👣', lb:'첫 발자국', cond:p=>Object.keys(p.explored).length>=1},
  {id:'ten', ic:'🎒', lb:'10개국 탐험', cond:p=>Object.keys(p.explored).length>=10},
  {id:'thirty', ic:'🚀', lb:'30개국 탐험', cond:p=>Object.keys(p.explored).length>=30},
  {id:'sixty', ic:'🌟', lb:'60개국 탐험', cond:p=>Object.keys(p.explored).length>=60},
  {id:'all', ic:'👑', lb:'세계 정복!', cond:p=>Object.keys(p.explored).length>=COUNTRIES.length},
];
function allBadgeDefs(){
  return SPECIAL_BADGES.concat(CONTINENTS.map(ct=>({
    id:'cont_'+ct.key, ic:ct.badge, lb:ct.name+' 완주',
    cond:p=>COUNTRIES.filter(c=>c.cont===ct.key).every(c=>p.explored[c.id])
  })));
}
function checkBadges(){
  const earned=[];
  for(const b of allBadgeDefs()){
    if(b.cond(P) && !P.badges.includes(b.id)){ P.badges.push(b.id); earned.push(b); }
  }
  earned.forEach((b,i)=>setTimeout(()=>toast(`🎖️ 배지 획득! ${b.ic} ${b.lb}`),800*i+400));
}

/* ---------------- 저장 ---------------- */
let saveTimer=null;
function saveProfile(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    const data = {nickname:P.nickname, avatar:P.avatar, xp:P.xp, level:levelOf(P.xp),
      explored:P.explored, badges:P.badges, exploredCount:Object.keys(P.explored).length,
      updatedAt:Date.now()};
    if(USE_FIREBASE && uid){
      try{ await fb.setDoc(fb.doc(db,'students',uid), data, {merge:true}); }
      catch(e){ console.warn('저장 실패', e); }
    }else{
      try{ localStorage.setItem('wx_profile', JSON.stringify(data)); }catch(e){}
    }
  }, 400);
}
function loadLocal(){
  try{
    const raw = localStorage.getItem('wx_profile');
    if(raw){ P=Object.assign(P, JSON.parse(raw));
      document.getElementById('nickname').value=P.nickname||'';
      if(P.avatar) selectAvatar(P.avatar);
    }
  }catch(e){}
}

/* ---------------- 화면 전환 ---------------- */
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if(name==='home') renderHome();
}
function toast(msg, ms=2200){
  const t=document.getElementById('toast'); t.innerHTML=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'), ms);
}
function updateHUD(){
  const lv=levelOf(P.xp);
  document.getElementById('hud-avatar').textContent=P.avatar;
  document.getElementById('hud-name').textContent=P.nickname||'-';
  document.getElementById('hud-title').textContent=titleOf(lv);
  document.getElementById('hud-level').textContent='Lv.'+lv;
  document.getElementById('hud-xp').textContent=P.xp+' XP';
  const cur=P.xp-xpForLevel(lv), need=xpForLevel(lv+1)-xpForLevel(lv);
  document.getElementById('hud-xpfill').style.width=Math.min(100, cur/need*100)+'%';
  document.getElementById('hud-explored').textContent=Object.keys(P.explored).length;
}

/* ---------------- 로그인 ---------------- */
let selAvatar='🧭';
function selectAvatar(a){
  selAvatar=a;
  document.querySelectorAll('.avatar-pick').forEach(el=>el.classList.toggle('sel', el.textContent===a));
}
function buildAvatars(){
  const row=document.getElementById('avatar-row');
  row.innerHTML=AVATARS.map(a=>`<div class="avatar-pick${a===selAvatar?' sel':''}" onclick="selectAvatar('${a}')">${a}</div>`).join('');
}
function startAdventure(){
  const nick=document.getElementById('nickname').value.trim();
  if(!nick){ toast('탐험가 이름을 입력해 주세요! ✏️'); return; }
  P.nickname=nick; P.avatar=selAvatar;
  saveProfile();
  document.getElementById('hud').classList.add('show');
  updateHUD();
  showScreen('home');
  toast(`${P.avatar} ${nick} 탐험가님, 환영합니다!`);
}

/* ---------------- 홈(대륙 선택) ---------------- */
function contProgress(key){
  const list=COUNTRIES.filter(c=>c.cont===key);
  const done=list.filter(c=>P.explored[c.id]).length;
  return {done, total:list.length};
}
function renderHome(){
  updateHUD();
  const grid=document.getElementById('continent-grid');
  grid.innerHTML=CONTINENTS.map(ct=>{
    const p=contProgress(ct.key);
    const full=p.done===p.total;
    return `<div class="cont-card" onclick="openStage('${ct.key}')">
      <div class="cont-badge${full?' earned':''}">${ct.badge}</div>
      <div class="emoji">${ct.emoji}</div>
      <h3>${ct.name}</h3>
      <div class="cnt">${ct.desc}</div>
      <div class="cont-progress"><div style="width:${p.total?p.done/p.total*100:0}%"></div></div>
      <div class="cnt" style="margin-top:4px">${p.done} / ${p.total} 개국 탐험 완료</div>
    </div>`;
  }).join('');
}

/* ---------------- 단계(난이도) 선택 ---------------- */
let curCont=null;
function tierDone(key,tier){
  const list=COUNTRIES.filter(c=>c.cont===key&&c.tier===tier);
  return {done:list.filter(c=>P.explored[c.id]).length, total:list.length};
}
function tierUnlocked(key,tier){
  if(tier===1) return true;
  const prev=tierDone(key,tier-1);
  return prev.total===0 || prev.done/prev.total>=0.7; /* 이전 단계 70% 이상 완료 시 해금 */
}
function openStage(key){
  curCont=key;
  const ct=CONTINENTS.find(c=>c.key===key);
  document.getElementById('stage-title').textContent=`${ct.emoji} ${ct.name} 탐험 기지`;
  const row=document.getElementById('tier-row');
  row.innerHTML=TIERS.map(t=>{
    const p=tierDone(key,t.tier);
    if(p.total===0) return '';
    const un=tierUnlocked(key,t.tier);
    const chips=COUNTRIES.filter(c=>c.cont===key&&c.tier===t.tier)
      .map(c=>`<span class="chip${P.explored[c.id]?' done':''}">${P.explored[c.id]?c.flag+' '+c.n:'❓'}</span>`).join('');
    return `<div class="tier-card${un?'':' locked'}">
      <h3>${t.emoji} ${t.name} <span style="font-size:.8rem;color:#888">(정답 시 +${t.xp}XP)</span></h3>
      <div class="desc">${t.desc} · ${p.done}/${p.total} 완료</div>
      <div style="margin-bottom:10px">${chips}</div>
      ${un?`<button class="btn teal small" onclick="startQuiz('${key}',${t.tier})">탐험 출발! 🧭</button>`
          :`<div class="jua" style="color:#999">🔒 이전 단계를 70% 이상 완료하면 열려요</div>`}
    </div>`;
  }).join('');
  showScreen('stage');
}

/* ---------------- 지도 ---------------- */
let WORLD=null, mapPath=null, mapSvg=null;
async function loadWorld(){
  if(WORLD) return WORLD;
  const topo = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r=>r.json());
  WORLD = topojson.feature(topo, topo.objects.countries).features;
  return WORLD;
}
function nameOf(id, feat){
  if(KO_BY_ID[id]) return KO_BY_ID[id].flag+' '+KO_BY_ID[id].n;
  return feat && feat.properties && feat.properties.name ? feat.properties.name : '이 나라';
}
async function drawMap(contKey){
  const feats=await loadWorld();
  const contIds=new Set(COUNTRIES.filter(c=>c.cont===contKey).map(c=>c.id));
  const contFeats=feats.filter(f=>contIds.has(String(f.id)));
  const W=940,H=560;
  const proj=d3.geoNaturalEarth1();
  proj.fitExtent([[20,20],[W-20,H-20]], {type:'FeatureCollection', features:contFeats});
  mapPath=d3.geoPath(proj);
  const wrap=d3.select('#map-wrap'); wrap.selectAll('*').remove();
  mapSvg=wrap.append('svg').attr('viewBox',`0 0 ${W} ${H}`);
  mapSvg.append('g').selectAll('path').data(feats).join('path')
    .attr('d',mapPath)
    .attr('class',f=>{
      const id=String(f.id);
      if(!contIds.has(id)) return 'country dim';
      return 'country in-cont'+(P.explored[id]?' explored-mark':'');
    })
    .attr('data-id',f=>String(f.id))
    .on('click',(ev,f)=>handleMapClick(String(f.id), f));
  /* 작은 나라 클릭 도우미 */
  const g2=mapSvg.append('g');
  contFeats.filter(f=>TINY.has(String(f.id))).forEach(f=>{
    const c=mapPath.centroid(f);
    if(isNaN(c[0])) return;
    g2.append('circle').attr('class','tiny-target')
      .attr('cx',c[0]).attr('cy',c[1]).attr('r',13)
      .attr('data-id',String(f.id))
      .on('click',()=>handleMapClick(String(f.id), f));
  });
}

/* ---------------- 퀴즈 ---------------- */
let QS=null; /* {list, idx, hearts, wrongs, locked, cont, tier} */
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
async function startQuiz(contKey,tier){
  const all=COUNTRIES.filter(c=>c.cont===contKey&&c.tier===tier);
  const remain=all.filter(c=>!P.explored[c.id]);
  const pool=remain.length? remain : all; /* 다 깼으면 복습 */
  const list=shuffle(pool.slice()).slice(0,8);
  QS={list, idx:0, hearts:3, wrongs:0, locked:true, cont:contKey, tier, review:remain.length===0};
  showScreen('quiz');
  document.getElementById('quiz-feedback').textContent='지도를 불러오는 중... 🛰️';
  await drawMap(contKey);
  QS.locked=false;
  if(QS.review) toast('이미 모두 탐험한 단계예요. 복습 모드로 진행! 📖');
  nextQuestion(true);
}
function nextQuestion(first){
  if(!QS) return;
  if(!first) QS.idx++;
  if(QS.idx>=QS.list.length){ finishQuiz(); return; }
  QS.hearts=3; QS.wrongs=0; QS.locked=false;
  const c=QS.list[QS.idx];
  document.getElementById('quiz-question').innerHTML=`🔎 <b>${c.n}</b> ${josa(c.n)} 지도에서 찾아 클릭하세요!`;
  document.getElementById('quiz-progress').textContent=(QS.idx+1)+'/'+QS.list.length;
  document.getElementById('quiz-feedback').textContent='';
  document.getElementById('quiz-hint').textContent='';
  renderHearts();
  mapSvg && mapSvg.selectAll('.country').classed('correct',false).classed('wrongpick',false);
}
function josa(w){ /* 을/를 */
  const code=w.charCodeAt(w.length-1);
  if(code<0xAC00||code>0xD7A3) return '을(를)';
  return (code-0xAC00)%28>0 ? '을' : '를';
}
function renderHearts(){
  document.getElementById('hearts').textContent='❤️'.repeat(QS.hearts)+'🖤'.repeat(3-QS.hearts);
}
function handleMapClick(id, feat){
  if(!QS||QS.locked) return;
  const c=QS.list[QS.idx];
  if(id===c.id){
    QS.locked=true;
    mapSvg.select(`path[data-id="${id}"]`).classed('correct',true);
    const base=TIERS.find(t=>t.tier===QS.tier).xp;
    let gain=QS.review?0:Math.max(5, base-5*QS.wrongs);
    document.getElementById('quiz-feedback').textContent=`🎉 정답! ${c.flag} ${c.n}!`;
    setTimeout(()=>onCorrect(c, gain), 700);
  }else{
    QS.hearts--; QS.wrongs++;
    renderHearts();
    const el=mapSvg.select(`path[data-id="${id}"]`);
    el.classed('wrongpick',true); setTimeout(()=>el.classed('wrongpick',false),600);
    if(QS.hearts<=0){
      QS.locked=true;
      document.getElementById('quiz-feedback').textContent=`아쉬워요! 정답은 여기예요 👇 (다음에 다시 도전!)`;
      mapSvg.select(`path[data-id="${c.id}"]`).classed('correct',true);
      setTimeout(()=>openInfo(c, 0, false), 1300);
    }else{
      document.getElementById('quiz-feedback').textContent=`앗, 거긴 ${nameOf(id,feat)}! 다시 찾아보세요.`;
      document.getElementById('quiz-hint').textContent =
        QS.wrongs===1 ? `💡 힌트: 수도는 ${c.cap}!` : `💡 힌트: ${c.loc}`;
    }
  }
}
function onCorrect(c, gain){
  const isNew=!P.explored[c.id];
  if(!QS.review){
    P.explored[c.id]=P.explored[c.id]||{note:'',ts:Date.now()};
    P.explored[c.id].ts=Date.now();
    addXP(gain);
  }
  checkBadges(); saveProfile(); updateHUD();
  openInfo(c, gain, isNew);
}
function addXP(gain){
  const before=levelOf(P.xp);
  P.xp+=gain;
  const after=levelOf(P.xp);
  if(after>before){
    const box=document.getElementById('levelup-box');
    box.innerHTML=`🎊 LEVEL UP! 🎊<br>Lv.${after} ${titleOf(after)}`;
    const ov=document.getElementById('levelup'); ov.classList.add('show');
    setTimeout(()=>ov.classList.remove('show'), 2200);
  }
}
function finishQuiz(){
  toast('🏁 이번 탐험 완료! 수고했어요.');
  QS=null;
  openStage(curCont);
}
function exitQuiz(){ QS=null; openStage(curCont); }

/* ---------------- 나라 정보 카드 ---------------- */
let curInfo=null, fromReview=false;
function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===tab));
  const c=curInfo; if(!c) return;
  const p=document.getElementById('mi-panel');
  if(tab==='basic') p.innerHTML=`<dl><dt>📍 위치</dt><dd>${c.loc}</dd><dt>🏛️ 수도</dt><dd>${c.cap}</dd><dt>👨‍👩‍👧‍👦 인구</dt><dd>${c.pop}</dd></dl>`;
  if(tab==='life') p.innerHTML=`<dl><dt>🍚 식(음식)</dt><dd>${c.food}</dd><dt>👘 의(옷)</dt><dd>${c.cloth}</dd><dt>🏠 주(집)</dt><dd>${c.house}</dd></dl>`;
  if(tab==='culture') p.innerHTML=`<dl><dt>🎭 문화</dt><dd>${c.cul}</dd><dt>✨ 재미있는 사실</dt><dd>${c.fact}</dd></dl>`;
}
function openInfo(c, gain, isNew, review){
  curInfo=c; fromReview=!!review;
  document.getElementById('mi-flag').textContent=c.flag;
  document.getElementById('mi-name').textContent=c.n;
  document.getElementById('mi-en').textContent=c.en;
  document.getElementById('mi-xp').innerHTML= gain>0?`<span class="xp-gain">+${gain} XP ${isNew?'· 새로운 나라 발견!':''}</span>`:'';
  document.getElementById('mi-note').value=(P.explored[c.id]&&P.explored[c.id].note)||'';
  switchTab('basic');
  document.getElementById('modal-info').classList.add('show');
}
function saveNoteAndClose(){
  const note=document.getElementById('mi-note').value.trim();
  if(curInfo && P.explored[curInfo.id]){ P.explored[curInfo.id].note=note; saveProfile(); }
  document.getElementById('modal-info').classList.remove('show');
  updateHUD();
  if(fromReview){ openPassport(); return; }
  if(QS) nextQuestion();
}

/* ---------------- 여권 / 랭킹 ---------------- */
function openPassport(){
  updateHUD();
  const n=Object.keys(P.explored).length;
  document.getElementById('pass-summary').textContent=
    `${P.avatar} ${P.nickname} · Lv.${levelOf(P.xp)} ${titleOf(levelOf(P.xp))} · 총 ${P.xp} XP · ${n}/${COUNTRIES.length}개국 탐험`;
  const shelf=document.getElementById('badge-shelf');
  shelf.innerHTML=allBadgeDefs().map(b=>`<div class="badge-item${P.badges.includes(b.id)?' earned':''}"><div class="ic">${b.ic}</div><div class="lb">${b.lb}</div></div>`).join('');
  const list=document.getElementById('pass-list');
  const items=COUNTRIES.filter(c=>P.explored[c.id]);
  list.innerHTML=items.length? items.map(c=>`<div class="pass-item" onclick="reviewCountry('${c.id}')">
      <div class="nm">${c.flag} ${c.n}</div>
      <div class="nt">${(P.explored[c.id].note||'✏️ 일지를 써 보세요')}</div>
    </div>`).join('') : '<div style="color:#888">아직 탐험한 나라가 없어요. 첫 모험을 떠나 볼까요? 🚀</div>';
  showScreen('passport');
}
function reviewCountry(id){ openInfo(KO_BY_ID[id], 0, false, true); }
async function openRank(){
  showScreen('rank');
  const body=document.getElementById('rank-body');
  if(!USE_FIREBASE){
    body.innerHTML=`<tr class="me"><td>-</td><td>${P.avatar} ${P.nickname}</td><td>Lv.${levelOf(P.xp)}</td><td>${P.xp}</td><td>${Object.keys(P.explored).length}</td></tr>
    <tr><td colspan="5" style="color:#888">연습 모드에서는 내 기록만 보여요. Firebase 연결 시 반 전체 랭킹이 나타나요!</td></tr>`;
    return;
  }
  body.innerHTML='<tr><td colspan="5">불러오는 중...</td></tr>';
  try{
    const q=fb.query(fb.collection(db,'students'), fb.orderBy('xp','desc'), fb.limit(10));
    const snap=await fb.getDocs(q);
    let rows='', rank=1;
    snap.forEach(docu=>{
      const d=docu.data();
      const medal=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank;
      rows+=`<tr${docu.id===uid?' class="me"':''}><td>${medal}</td><td>${d.avatar||'🧭'} ${d.nickname||'?'}</td><td>Lv.${d.level||1}</td><td>${d.xp||0}</td><td>${d.exploredCount||0}</td></tr>`;
      rank++;
    });
    body.innerHTML=rows||'<tr><td colspan="5">아직 기록이 없어요.</td></tr>';
  }catch(e){
    body.innerHTML='<tr><td colspan="5">랭킹을 불러오지 못했어요. (Firestore 색인/규칙 확인)</td></tr>';
  }
}

/* ---------------- 시작 ---------------- */
window.showScreen=showScreen; window.selectAvatar=selectAvatar; window.startAdventure=startAdventure;
window.openStage=openStage; window.startQuiz=startQuiz; window.exitQuiz=exitQuiz;
window.switchTab=switchTab; window.saveNoteAndClose=saveNoteAndClose;
window.openPassport=openPassport; window.openRank=openRank; window.reviewCountry=reviewCountry;

buildAvatars();
if(!USE_FIREBASE) loadLocal();
initFirebase();
loadWorld(); /* 미리 불러두기 */
document.getElementById('nickname').addEventListener('keydown',e=>{ if(e.key==='Enter') startAdventure(); });
</script>
</body>
